<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD - Marketplace</title>
    <style>
        :root {
            --clr-primary: #ff4757;
            --clr-bg: #0a0a0a;
            --clr-panel: #161616;
            --clr-text: #ffffff;
            --clr-gray: #888888;
            --border-ui: rgba(255, 255, 255, 0.05);
            --transition-main: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --radius-lg: 24px;
            --radius-sm: 12px;
            --shadow-glow: 0 10px 30px rgba(255, 71, 87, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            background: var(--clr-bg); 
            color: var(--clr-text); 
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: 280px; 
            background: var(--clr-panel); 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid var(--border-ui);
            animation: fadeInRight 0.8s var(--transition-main);
        }

        .main-content { 
            flex: 1; 
            padding: 60px; 
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .nav-link {
            display: block;
            color: var(--clr-gray);
            text-decoration: none;
            padding: 14px 0;
            font-weight: 600;
            transition: var(--transition-main);
        }

        .nav-link:hover { color: var(--clr-text); padding-left: 10px; }
        .nav-link.active { color: var(--clr-primary); }

        .header-section {
            animation: fadeInUp 0.8s var(--transition-main) 0.1s backwards;
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .product-card {
            background: var(--clr-panel);
            border-radius: var(--radius-lg);
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border-ui);
            transition: var(--transition-main);
            animation: fadeInUp 0.6s var(--transition-main) backwards;
        }

        .product-card:hover {
            transform: translateY(-12px);
            border-color: var(--clr-primary);
            box-shadow: var(--shadow-glow);
            background: rgba(255, 255, 255, 0.02);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 20px;
            transition: var(--transition-main);
        }

        .product-card:hover img { transform: scale(1.1) rotate(3deg); }

        .price-tag {
            font-size: 24px;
            font-weight: 800;
            color: var(--clr-primary);
            margin: 10px 0 20px;
        }

        .btn-buy {
            background: var(--clr-primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition-main);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ed573;
            color: white;
            padding: 16px 32px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(46, 213, 115, 0.3);
            transform: translateY(100px);
            opacity: 0;
            z-index: 1000;
            transition: var(--transition-main);
        }

        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">Successfully Purchased!</div>

    <aside class="sidebar">
        <h2 style="font-size: 30px; font-weight: 900;">MD<span style="color:var(--clr-primary)">.</span></h2>
        <nav style="margin-top: 60px; flex-grow: 1;">
            <a href="dashboard.html" class="nav-link">DASHBOARD</a>
            <a href="product.html" class="nav-link active">MARKETPLACE</a>
            <a href="transaction.html" class="nav-link">TRANSACTIONS</a>
        </nav>
        <p style="font-size: 11px; color: var(--clr-gray); letter-spacing: 2px;">WALLET BALANCE</p>
        <p id="balance-val" style="font-size: 20px; font-weight: 800; color: var(--clr-primary); margin-bottom: 20px;">₱0.00</p>
    </aside>

    <main class="main-content">
        <header class="header-section">
            <h1 style="font-size: 42px; font-weight: 900;">Marketplace</h1>
            <p style="color: var(--clr-gray); font-size: 18px;">Acquire premium assets for your collection.</p>
        </header>

        <div class="market-grid">
            <div class="product-card">
                <img src="images (6).jpg" alt="Red Horse">
                <h3>Red Horse</h3>
                <div class="price-tag">₱120.00</div>
                <button class="btn-buy" onclick="buy(120, 'Red Horse')">Acquire</button>
            </div>

            <div class="product-card">
                <img src="images (7).jpg" alt="Emperador">
                <h3>Emperador Sync</h3>
                <div class="price-tag">₱99.00</div>
                <button class="btn-buy" onclick="buy(99, 'Emperador Sync')">Acquire</button>
            </div>

            <div class="product-card">
                <img src="bt-tanduaydarkrhum-5yo-750ml_grande_b6c8556d-0801-4c05-906a-447d65ac3625.jpg" alt="Tanduay">
                <h3>Tanduay Pro</h3>
                <div class="price-tag">₱299.00</div>
                <button class="btn-buy" onclick="buy(299, 'Tanduay Pro')">Acquire</button>
            </div>
        </div>
    </main>

    <script>
        function updateUI() {
            const currentUser = localStorage.getItem('regUser');
            const userDatabase = JSON.parse(localStorage.getItem('userDatabase') || "[]");
            const user = userDatabase.find(u => u.username === currentUser);
            
            if (user) {
                document.getElementById('balance-val').innerText = '₱' + parseFloat(user.balance).toLocaleString();
                localStorage.setItem('userBalance', user.balance);
            }
        }

        function buy(price, name) {
            const currentUser = localStorage.getItem('regUser');
            let userDatabase = JSON.parse(localStorage.getItem('userDatabase') || "[]");
            let userIndex = userDatabase.findIndex(u => u.username === currentUser);

            if (userIndex === -1) {
                alert("Session error. Please login again.");
                return;
            }

            let user = userDatabase[userIndex];

            if (user.balance >= price) {
                user.balance -= price;
                
                if (!user.transactions) user.transactions = [];
                user.transactions.push({
                    item: name,
                    cost: price,
                    date: new Date().toLocaleString(),
                    status: 'Completed'
                });

                userDatabase[userIndex] = user;
                localStorage.setItem('userDatabase', JSON.stringify(userDatabase));
                localStorage.setItem('userBalance', user.balance);
                
                showToast("Acquired " + name);
                updateUI();
            } else {
                alert("Insufficient Liquidity.");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        updateUI();
    </script>
</body>
</html>
